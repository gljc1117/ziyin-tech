<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2463"/>
      <stop offset="100%" style="stop-color:#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 3D 立方体线框 - 代表3D重建 -->
  <g stroke="#00B4D8" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- 前面 -->
    <path d="M160 200 L256 150 L352 200 L256 250 Z"/>
    <!-- 左侧 -->
    <path d="M160 200 L160 310 L256 360 L256 250"/>
    <!-- 右侧 -->
    <path d="M352 200 L352 310 L256 360 L256 250"/>
  </g>
  <!-- 十字准线 - 代表精准定位 -->
  <circle cx="256" cy="240" r="40" stroke="#10B981" stroke-width="8" fill="none" opacity="0.7"/>
  <line x1="256" y1="195" x2="256" y2="215" stroke="#10B981" stroke-width="6" opacity="0.7"/>
  <line x1="256" y1="265" x2="256" y2="285" stroke="#10B981" stroke-width="6" opacity="0.7"/>
  <line x1="211" y1="240" x2="231" y2="240" stroke="#10B981" stroke-width="6" opacity="0.7"/>
  <line x1="281" y1="240" x2="301" y2="240" stroke="#10B981" stroke-width="6" opacity="0.7"/>
  <!-- 子殷 文字 -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="72" fill="white" letter-spacing="8">子殷</text>
</svg>
